<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#232323"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d8b4fe"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- macOS icon: 824x824 centered in 1024x1024 with transparent surround -->
  <!-- Rounded rect background (squircle approximation) -->
  <rect x="100" y="100" width="824" height="824" rx="185" fill="url(#bg)"/>
  <!-- Subtle inner glow -->
  <rect x="100" y="100" width="824" height="824" rx="185" fill="url(#glow)"/>
  <!-- Thin border -->
  <rect x="102" y="102" width="820" height="820" rx="183" fill="none" stroke="white" stroke-opacity="0.06" stroke-width="1.5"/>
  <!-- Code bracket hints — subtle decorative elements -->
  <text x="270" y="560" font-family="SF Mono, Menlo, Monaco, Consolas, monospace" font-weight="300" font-size="280" fill="#a78bfa" opacity="0.15">{</text>
  <text x="640" y="560" font-family="SF Mono, Menlo, Monaco, Consolas, monospace" font-weight="300" font-size="280" fill="#a78bfa" opacity="0.15">}</text>
  <!-- Letter n — bold, centered -->
  <text x="512" y="590" text-anchor="middle" font-family="SF Mono, Menlo, Monaco, Consolas, monospace" font-weight="700" font-size="380" fill="url(#accent)">n</text>
  <!-- Blinking cursor -->
  <rect x="668" y="310" width="5" height="280" rx="2.5" fill="#a78bfa" opacity="0.6"/>
  <!-- Bottom accent line — like a code underline -->
  <rect x="340" y="660" width="344" height="3" rx="1.5" fill="#a78bfa" opacity="0.25"/>
</svg>
