<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="nodl — A scratchpad for TypeScript">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#171717"/>
      <stop offset="1" stop-color="#1e1e1e"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="38%" r="55%">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.28"/>
      <stop offset="0.6" stop-color="#a78bfa" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="gridFade" cx="50%" cy="40%" r="55%">
      <stop offset="0.25" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>

    <mask id="gridMask">
      <rect width="1200" height="630" fill="url(#gridFade)"/>
    </mask>

    <linearGradient id="tsGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c4b5fd"/>
      <stop offset="0.55" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>

    <filter id="tsBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- Background layers -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g mask="url(#gridMask)">
    <rect width="1200" height="630" fill="url(#grid)"/>
  </g>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Name: logomark + wordmark (centered at top) -->
  <g transform="translate(552 80)">
    <!-- Logomark (36x36) scaled from 24x24 viewBox -->
    <g transform="scale(1.5)">
      <rect width="24" height="24" rx="6" fill="#a78bfa"/>
      <path d="M7 17V9.5C7 9.224 7.224 9 7.5 9H9C9.276 9 9.5 9.224 9.5 9.5V11" stroke="#171717" stroke-width="1.6" stroke-linecap="round" fill="none"/>
      <path d="M14.5 17V11.5C14.5 10.119 13.381 9 12 9C10.619 9 9.5 10.119 9.5 11.5V17" stroke="#171717" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <circle cx="17" cy="17" r="1.2" fill="#171717"/>
    </g>
    <!-- Wordmark -->
    <text x="48" y="27" font-family="ui-monospace, 'JetBrains Mono', 'Menlo', monospace" font-size="22" font-weight="600" fill="#e5e5e5" letter-spacing="-0.5">nodl</text>
  </g>

  <!-- Headline -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif" font-size="96" font-weight="600" letter-spacing="-3">
    <text x="600" y="290" text-anchor="middle" fill="#f5f5f5">A scratchpad</text>

    <!-- Soft violet glow behind "TypeScript" -->
    <text x="600" y="400" text-anchor="middle" fill="#a78bfa" fill-opacity="0.18" filter="url(#tsBlur)">
      <tspan fill-opacity="0">for </tspan>
      <tspan>TypeScript</tspan>
      <tspan fill-opacity="0">.</tspan>
    </text>

    <text x="600" y="400" text-anchor="middle">
      <tspan fill="#f5f5f5">for </tspan>
      <tspan fill="url(#tsGradient)">TypeScript</tspan>
      <tspan fill="#f5f5f5">.</tspan>
    </text>
  </g>

  <!-- Intro / subhead -->
  <text x="600" y="475" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif" font-size="24" fill="#999999" letter-spacing="-0.2">
    Instant inline output. Full TypeScript. Real npm packages.
  </text>

  <!-- GitHub link (centered at bottom) -->
  <g transform="translate(442 540)">
    <g transform="translate(0 0)" stroke="#7a7a7a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.4 5.4 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/>
      <path d="M9 18c-4.51 2-5-2-7-2"/>
    </g>
    <text x="34" y="18" font-family="ui-monospace, 'JetBrains Mono', 'Menlo', monospace" font-size="18" fill="#999999" letter-spacing="-0.2">github.com/hungdoansy/nodl</text>
  </g>
</svg>
