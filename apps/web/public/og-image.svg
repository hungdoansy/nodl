<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="nodl — A scratchpad for JavaScript">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#171717"/>
      <stop offset="1" stop-color="#1e1e1e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logomark -->
  <g transform="translate(110 240)">
    <rect width="72" height="72" rx="16" fill="#a78bfa"/>
    <path d="M21 53V31.2C21 30.5 21.5 30 22.2 30H25.2C25.9 30 26.4 30.5 26.4 31.2V35.5" stroke="#171717" stroke-width="4.2" stroke-linecap="round"/>
    <path d="M44 53V35.5C44 31.4 40.6 28 36.5 28C32.4 28 29 31.4 29 35.5V53" stroke="#171717" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="49" cy="53" r="3" fill="#171717"/>
  </g>

  <!-- Wordmark -->
  <text x="210" y="305" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="84" font-weight="600" fill="#f5f5f5" letter-spacing="-2">nodl</text>

  <!-- Tagline -->
  <text x="110" y="402" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="44" font-weight="600" fill="#f5f5f5" letter-spacing="-1">A scratchpad for JavaScript.</text>
  <text x="110" y="448" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" fill="#999999">Instant inline output. Full TypeScript. Real npm packages.</text>

  <!-- Footer chip -->
  <g transform="translate(110 510)">
    <rect width="170" height="40" rx="8" fill="rgba(167,139,250,0.12)" stroke="rgba(167,139,250,0.3)"/>
    <text x="20" y="26" font-family="ui-monospace, monospace" font-size="16" fill="#c4b5fd">↓ macOS · v2.1.0</text>
  </g>
  <text x="300" y="535" font-family="ui-monospace, monospace" font-size="16" fill="#666666">nodl.app</text>
</svg>
